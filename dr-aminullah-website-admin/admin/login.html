<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Login CMS — Dr. Aminullah</title>
  <link rel="stylesheet" href="assets/admin.css?v=2.0">
  <style>
    /* Styling khusus untuk memposisikan kotak login di tengah layar */
    body.login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      margin: 0;
    }
    .login-card {
      background: #fff;
      padding: 32px;
      border-radius: 24px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--line);
    }
    .login-card h1 { margin-top: 0; margin-bottom: 8px; color: var(--accent-dark); }
    .login-card p { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
    .error-msg {
      color: #B42318;
      background: #FEF3F2;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
      text-align: center;
      border: 1px solid #FECDCA;
    }
  </style>
</head>
<body class="login-page">

  <div class="login-card">
    <h1>Login CMS</h1>
    <p>Panel Manajemen Data Dr. Aminullah</p>
    
    <form id="form-login">
      <div style="margin-bottom: 16px;">
        <label>Username</label>
        <input type="text" id="input-user" placeholder="Masukkan username..." required autofocus>
      </div>
      <div style="margin-bottom: 24px;">
        <label>Password</label>
        <input type="password" id="input-pass" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn" style="width: 100%;">Masuk ke Admin</button>
      
      <div id="login-error" class="error-msg">Username atau password salah!</div>
    </form>
  </div>

  <script>
    document.getElementById('form-login').addEventListener('submit', function(e) {
      e.preventDefault(); // Mencegah reload halaman
      
      const user = document.getElementById('input-user').value;
      const pass = document.getElementById('input-pass').value;
      const errorMsg = document.getElementById('login-error');

      // Validasi Username dan Password sesuai permintaan
      if (user === 'draminullah' && pass === 'draminullahuyp1') {
        // Jika benar, simpan "kunci" di Session Storage browser
        sessionStorage.setItem('adminLoggedIn', 'true');
        
        // Alihkan ke halaman dashboard admin
        window.location.href = 'index.html';
      } else {
        // Jika salah, tampilkan pesan error
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
