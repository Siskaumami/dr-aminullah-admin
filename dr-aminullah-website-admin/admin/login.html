<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Login Admin — Dr. Aminullah</title>
  <link rel="stylesheet" href="assets/admin.css">
</head>
<body class="login-page">
  <main class="login-card">
    <h1>Login Admin</h1>
    <p>Kerangka halaman login. Hubungkan ke Supabase Auth pada tahap backend.</p>
    <form data-admin-form>
      <label>Email Admin</label>
      <input type="email" placeholder="admin@domain.com" required>
      <br><br>
      <label>Password</label>
      <input type="password" placeholder="••••••••" required>
      <br><br>
      <button class="btn" type="submit">Masuk</button>
      <a class="btn secondary" href="../index.html">Lihat Landing Page</a>
      <p data-form-message style="display:none;margin-top:14px;color:#0B6FAE;"></p>
    </form>
  </main>
  <script src="assets/admin.js"></script>
</body>
</html>
